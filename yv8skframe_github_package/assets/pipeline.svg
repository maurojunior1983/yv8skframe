<svg width="1100" height="260" viewBox="0 0 1100 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
      <stop stop-color="#0f172a" offset="0"/><stop stop-color="#1e40af" offset="1"/>
    </linearGradient>
    <style>
      .title{font:700 28px Arial, sans-serif; fill:#fff}
      .sub{font:400 15px Arial, sans-serif; fill:#dbeafe}
      .box{fill:#ffffff;stroke:#93c5fd;stroke-width:2;rx:18;ry:18}
      .bt{font:700 16px Arial, sans-serif; fill:#0f172a}
      .bs{font:400 13px Arial, sans-serif; fill:#334155}
      .arrow{stroke:#60a5fa;stroke-width:3;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#60a5fa" />
    </marker>
  </defs>
  <rect width="1100" height="260" fill="url(#g)"/>
  <text x="40" y="48" class="title">YV8SKFRAME - PiP Advertising Keyframe Detection</text>
  <text x="40" y="76" class="sub">End-to-end pipeline for training, validation and inference of YOLOv8, YOLO26 and ViT in soccer broadcast videos</text>
  <rect x="45" y="115" width="180" height="90" class="box"/><text x="70" y="148" class="bt">1. Dataset</text><text x="70" y="173" class="bs">Frames + labels</text><text x="70" y="193" class="bs">Videos for valid/test</text>
  <line x1="230" y1="160" x2="290" y2="160" class="arrow"/>
  <rect x="300" y="115" width="180" height="90" class="box"/><text x="325" y="148" class="bt">2. Training</text><text x="325" y="173" class="bs">YOLOv8 / YOLO26</text><text x="325" y="193" class="bs">ViT classifiers</text>
  <line x1="485" y1="160" x2="545" y2="160" class="arrow"/>
  <rect x="555" y="115" width="190" height="90" class="box"/><text x="580" y="148" class="bt">3. Validation</text><text x="580" y="173" class="bs">Temporal smoothing</text><text x="580" y="193" class="bs">Threshold tuning</text>
  <line x1="750" y1="160" x2="810" y2="160" class="arrow"/>
  <rect x="820" y="115" width="230" height="90" class="box"/><text x="845" y="148" class="bt">4. Detection</text><text x="845" y="173" class="bs">Start/end PiP keyframes</text><text x="845" y="193" class="bs">Excel reports + metrics</text>
</svg>